name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        dotnet:
          - 8.0.x
          - 9.0.x
          - 10.0.x

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Build library packages (SDK 8 / 9)
        if: matrix.dotnet != '10.0.x'
        run: |
          dotnet build src/TrainOP/TrainOP.csproj -c Release
          dotnet build src/TrainOP.Generators/TrainOP.Generators.csproj -c Release

      - name: Restore
        if: matrix.dotnet == '10.0.x'
        run: dotnet restore TrainOP.sln

      - name: Build
        if: matrix.dotnet == '10.0.x'
        run: dotnet build TrainOP.sln -c Release --no-restore

      - name: Test
        if: matrix.dotnet == '10.0.x'
        run: dotnet test TrainOP.sln -c Release --no-build --verbosity normal
